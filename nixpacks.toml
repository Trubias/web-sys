# Final Robust Build - Fixed Composer and Extensions
[variables]
NIXPACKS_LARAVEL_NO_DIAGNOSE = "1"
NIXPACKS_LARAVEL_SKIP_ENV_CHECK = "1"
DB_CONNECTION = "sqlite"
DB_DATABASE = ":memory:"

[phases.setup]
nixPkgs = [
    "php82", 
    "php82Packages.composer",
    "php82Packages.pdo_mysql",
    "php82Packages.mbstring",
    "php82Packages.gd",
    "php82Packages.xml",
    "php82Packages.bcmath",
    "php82Packages.curl",
    "php82Packages.zip",
    "php82Packages.intl",
    "nodejs_18", 
    "npm-9_x"
]

[phases.install]
cmds = ["composer install --no-dev --no-interaction --prefer-dist", "npm ci"]

[phases.build]
cmds = ["npm run prod"]

[start]
cmd = "php artisan migrate:fresh --seed --force && php artisan storage:link && node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)"
