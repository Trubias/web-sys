# Force-defined Build Plan
[variables]
NIXPACKS_LARAVEL_NO_DIAGNOSE = "1"
NIXPACKS_LARAVEL_SKIP_ENV_CHECK = "1"
NIXPACKS_PHP_EXTENSIONS = "pdo_mysql,mbstring,gd,xml,bcmath,curl,zip,intl"

[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_18", "npm-9_x"]

[phases.install]
cmds = ["DB_CONNECTION=sqlite DB_DATABASE=:memory: composer install --no-dev --no-interaction --prefer-dist", "npm ci"]

[phases.build]
cmds = ["DB_CONNECTION=sqlite DB_DATABASE=:memory: npm run prod"]

[start]
cmd = "php artisan migrate --force && node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)"
```

**Step 4: Save the file**

---

**Step 5: Now push to GitHub**
```
git add nixpacks.toml
git commit -m "fix: add migrate to start command"
