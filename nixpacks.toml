[variables]
NIXPACKS_LARAVEL_NO_DIAGNOSE = "1"
NIXPACKS_LARAVEL_SKIP_ENV_CHECK = "1"
NIXPACKS_PHP_EXTENSIONS = "pdo_mysql,mbstring,gd,xml,bcmath,curl,zip,intl"

[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_18", "npm-9_x"]

[phases.install]
cmds = ["composer install --no-dev --no-interaction --prefer-dist --ignore-platform-req=php", "npm ci"]

[phases.build]
cmds = ["npm run prod"]

[start]
cmds = ["php artisan migrate --force && node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)]
